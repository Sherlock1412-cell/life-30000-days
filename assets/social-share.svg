<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Decorative dots (stars) -->
  <circle cx="100" cy="80" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="250" cy="150" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="400" cy="50" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="550" cy="120" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="700" cy="70" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="900" cy="100" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1050" cy="60" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1100" cy="150" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="150" cy="450" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1050" cy="500" r="1" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Emoji Sun -->
  <text x="600" y="140" text-anchor="middle" font-size="72">🌅</text>
  
  <!-- Title -->
  <text x="600" y="230" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="900" fill="white">Life 30,000 Days</text>
  
  <!-- Chinese subtitle -->
  <text x="600" y="280" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">人生三万天</text>
  
  <!-- Big number -->
  <text x="600" y="380" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="900" fill="url(#accent)">10,950</text>
  
  <!-- Days label -->
  <text x="600" y="420" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">DAYS REMAINING</text>
  
  <!-- Progress bar -->
  <rect x="300" y="460" width="600" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="460" width="360" height="6" rx="3" fill="url(#accent)"/>
  
  <!-- Percentage -->
  <text x="600" y="500" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">36.5% lived</text>
  
  <!-- Feature pills -->
  <rect x="220" y="540" width="120" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="280" y="561" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.6)">🎵 White Noise</text>
  
  <rect x="360" y="540" width="110" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="415" y="561" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.6)">🧘 Meditation</text>
  
  <rect x="490" y="540" width="100" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="540" y="561" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.6)">📝 Journal</text>
  
  <rect x="610" y="540" width="110" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="665" y="561" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.6)">🎨 Wallpaper</text>
  
  <rect x="740" y="540" width="120" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="800" y="561" text-anchor="middle" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.6)">🏆 Achievements</text>
  
  <!-- Tagline -->
  <text x="600" y="610" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-style="italic" fill="rgba(255,255,255,0.3)">Every day is a one-of-a-kind gift</text>
</svg>
