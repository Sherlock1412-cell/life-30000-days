<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.2)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Decorative circles (stars) -->
  <circle cx="100" cy="80" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="250" cy="120" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="400" cy="60" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="550" cy="100" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="700" cy="50" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="850" cy="90" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1000" cy="70" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="1100" cy="110" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="150" cy="550" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="350" cy="580" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="900" cy="560" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1050" cy="540" r="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Sun emoji -->
  <text x="600" y="160" text-anchor="middle" font-size="80">🌅</text>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="'Noto Sans SC', -apple-system, sans-serif" font-size="56" font-weight="900" fill="url(#textGrad)">Life 30,000 Days</text>

  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="'Noto Sans SC', -apple-system, sans-serif" font-size="28" font-weight="300" fill="rgba(255,255,255,0.7)">人生三万天</text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="'Noto Sans SC', -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">Every day is a one-of-a-kind gift</text>

  <!-- Features row -->
  <text x="200" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">🎵</text>
  <text x="200" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">White Noise</text>

  <text x="360" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">🧘</text>
  <text x="360" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Meditation</text>

  <text x="520" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">📝</text>
  <text x="520" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Journal</text>

  <text x="680" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">🎨</text>
  <text x="680" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Wallpapers</text>

  <text x="840" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">🏆</text>
  <text x="840" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Achievements</text>

  <text x="1000" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="36">📊</text>
  <text x="1000" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Life Report</text>

  <!-- Divider line -->
  <line x1="200" y1="540" x2="1000" y2="540" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Bottom tag -->
  <text x="600" y="580" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">100% Free · Privacy-First · Open Source</text>
</svg>
